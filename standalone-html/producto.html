<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANarte - Producto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">SANarte</a>
            <nav class="nav">
                <a href="index.html" class="nav-link active">CATÁLOGO</a>
                <a href="index.html" class="nav-link">CATEGORÍAS</a>
                <a href="#" class="nav-link">CONTACTO</a>
            </nav>
            <button class="cart-btn">
                <svg width="16" height="20" viewBox="0 0 16 20" fill="none">
                    <path d="M0 20L1.5 6H14.5L16 20H0ZM8 0C9.06087 0 10.0783 0.421427 10.8284 1.17157C11.5786 1.92172 12 2.93913 12 4H14C14 2.4087 13.3679 0.88258 12.2426 -0.242641C11.1174 -1.36786 9.59131 -2 8 -2C6.40869 -2 4.88258 -1.36786 3.75736 -0.242641C2.63214 0.88258 2 2.4087 2 4H4C4 2.93913 4.42143 1.92172 5.17157 1.17157C5.92172 0.421427 6.93913 0 8 0Z" fill="#874D32"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="product-detail-content">
        <div class="product-detail-section">
            <!-- Left: Image Gallery -->
            <div class="image-gallery">
                <div class="thumbnail-column" id="thumbnails">
                    <!-- Thumbnails will be loaded here -->
                </div>
                <div class="main-image-container">
                    <img id="mainProductImage" src="" alt="Producto">
                </div>
            </div>

            <!-- Right: Product Info -->
            <div class="product-info">
                <div class="product-header">
                    <span class="product-category" id="productCategory">CERÁMICA TRADICIONAL</span>
                    <h1 id="productName">Cargando...</h1>
                    <p class="product-price" id="productPrice">$0.00 USD</p>
                </div>

                <div class="product-description" id="productDescription">
                    <p>Cargando descripción del producto...</p>
                </div>

                <div class="product-specs">
                    <div class="spec-row">
                        <span class="spec-label">Materiales</span>
                        <span class="spec-value" id="productMaterials">-</span>
                    </div>
                    <div class="spec-row">
                        <span class="spec-label">Dimensiones</span>
                        <span class="spec-value" id="productDimensions">-</span>
                    </div>
                    <div class="spec-row">
                        <span class="spec-label">Disponibilidad</span>
                        <span class="spec-value availability" id="productAvailability">-</span>
                    </div>
                </div>

                <div class="product-actions">
                    <button class="btn-primary">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M10 0C15.523 0 20 4.477 20 10C20 15.523 15.523 20 10 20C4.477 20 0 15.523 0 10C0 4.477 4.477 0 10 0ZM10 5C9.73478 5 9.48043 5.10536 9.29289 5.29289C9.10536 5.48043 9 5.73478 9 6V9H6C5.73478 9 5.48043 9.10536 5.29289 9.29289C5.10536 9.48043 5 9.73478 5 10C5 10.2652 5.10536 10.5196 5.29289 10.7071C5.48043 10.8946 5.73478 11 6 11H9V14C9 14.2652 9.10536 14.5196 9.29289 14.7071C9.48043 14.8946 9.73478 15 10 15C10.2652 15 10.5196 14.8946 10.7071 14.7071C10.8946 14.5196 11 14.2652 11 14V11H14C14.2652 11 14.5196 10.8946 14.7071 10.7071C14.8946 10.5196 15 10.2652 15 10C15 9.73478 14.8946 9.48043 14.7071 9.29289C14.5196 9.10536 14.2652 9 14 9H11V6C11 5.73478 10.8946 5.48043 10.7071 5.29289C10.5196 5.10536 10.2652 5 10 5Z" fill="white"/>
                        </svg>
                        Consultar por esta pieza
                    </button>
                    <p class="help-text">Atención personalizada directa con el taller.</p>
                </div>
            </div>
        </div>

        <!-- Related Products -->
        <div class="related-products-section">
            <h2>Obras Relacionadas</h2>
            <div class="related-products-grid" id="relatedProducts">
                <!-- Related products will be loaded here -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <!-- Footer content -->
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="producto.js"></script>
</body>
</html>

name: SANarte CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECS_CLUSTER: sanarte-cluster

jobs:

  # ── FASE 1: BUILD ────────────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    outputs:
      gateway-image: ${{ steps.build-gateway.outputs.image }}
      admin-image: ${{ steps.build-admin.outputs.image }}
      public-image: ${{ steps.build-public.outputs.image }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push — gateway-service
        id: build-gateway
        run: |
          IMAGE_URI=$ECR_REGISTRY/sanarte/gateway-service:${{ github.sha }}
          docker build -t $IMAGE_URI ./gateway-service
          docker push $IMAGE_URI
          docker tag $IMAGE_URI $ECR_REGISTRY/sanarte/gateway-service:latest
          docker push $ECR_REGISTRY/sanarte/gateway-service:latest
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Build y push — admin-products-service
        id: build-admin
        run: |
          IMAGE_URI=$ECR_REGISTRY/sanarte/admin-products-service:${{ github.sha }}
          docker build -t $IMAGE_URI ./admin-products-service
          docker push $IMAGE_URI
          docker tag $IMAGE_URI $ECR_REGISTRY/sanarte/admin-products-service:latest
          docker push $ECR_REGISTRY/sanarte/admin-products-service:latest
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Build y push — public-products-service
        id: build-public
        run: |
          IMAGE_URI=$ECR_REGISTRY/sanarte/public-products-service:${{ github.sha }}
          docker build -t $IMAGE_URI ./public-products-service
          docker push $IMAGE_URI
          docker tag $IMAGE_URI $ECR_REGISTRY/sanarte/public-products-service:latest
          docker push $ECR_REGISTRY/sanarte/public-products-service:latest
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ── FASE 2: TEST ─────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Tests — admin-products-service
        run: |
          cd admin-products-service
          mvn test -B

      - name: Tests — public-products-service
        run: |
          cd public-products-service
          mvn test -B

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build — frontend-user-artesanias
        run: |
          cd frontend-user-artesanias
          npm ci
          npm run build

      - name: Subir resultados como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            admin-products-service/target/surefire-reports/
            public-products-service/target/surefire-reports/

  # ── FASE 3: DEPLOY ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy gateway-service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service gateway-service \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Deploy admin-products-service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service admin-products-service \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Deploy public-products-service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service public-products-service \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Esperar estabilidad de los servicios
        run: |
          for SERVICE in gateway-service admin-products-service public-products-service; do
            echo "Esperando $SERVICE..."
            aws ecs wait services-stable \
              --cluster $ECS_CLUSTER \
              --services $SERVICE \
              --region $AWS_REGION
          done

      - name: Verificar API después del deploy
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names sanarte-alb \
            --query "LoadBalancers[0].DNSName" \
            --output text \
            --region $AWS_REGION)
          echo "Verificando http://$ALB_DNS/actuator/health ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://$ALB_DNS/actuator/health)
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: La API responde con status $STATUS"
            exit 1
          fi
          echo "Deploy exitoso. API responde 200 en http://$ALB_DNS"

      - name: Resumen del deploy
        run: |
          aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services gateway-service admin-products-service public-products-service \
            --query "services[*].[serviceName,runningCount,desiredCount,status]" \
            --output table
